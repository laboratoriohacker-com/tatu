id: password-assignment
info:
  name: Hardcoded Password Assignment
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.17
    - PCI DSS Req 8.2
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - password
    - credentials
    - hardcoded

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '(?i)\b(?:password|passwd|pwd)\s*[:=]\s*[''"][^''\"]{8,}[''"]'

message: "Hardcoded password detected in content. Never hardcode passwords in source code. Use environment variables or a secrets manager instead."
