id: discord-secret
info:
  name: Discord Token/Webhook
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.15
    - NIST CSF PR.AC-3
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - discord

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b[MNO][A-Za-z0-9_-]{23,25}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}\b'
    - 'https://(?:canary\.|ptb\.)?discord(?:app)?\.com/api/webhooks/\d{5,30}/[A-Za-z0-9_-]{30,}'

message: "Discord bot token or webhook detected. Secure these in environment variables."
