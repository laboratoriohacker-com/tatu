id: generic-api-key
info:
  name: Generic API Key Assignment
  author: tatu-core
  severity: warning
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - NIST CSF PR.AC-1
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - api-key
    - credentials
    - generic

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: warn
  mode: audit

detect:
  type: regex
  patterns:
    - '(?i)(?:api_?key|api_?secret|access_?token)\s*[:=]\s*[''"][A-Za-z0-9_\-]{20,}[''"]'

message: "Possible API key or token assignment detected. Verify this is not a real credential being hardcoded. Use environment variables or a secrets manager instead."
