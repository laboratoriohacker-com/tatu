id: basic-auth-url
info:
  name: Credentials in URL (Basic Auth)
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.9.4
  tags:
    - basic-auth
    - url
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '://[^:/?#\[\]@\s]+:[^:/?#\[\]@\s]+@'

message: "Credentials embedded in URL detected. Never include usernames and passwords in URLs. Use environment variables or a secrets manager instead."
