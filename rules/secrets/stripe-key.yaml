id: stripe-key
info:
  name: Stripe API Key
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - PCI DSS Req 4.2
    - NIST CSF PR.DS-1
    - FedRAMP SC-8
    - DORA Art. 9
  tags:
    - stripe
    - payment
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b(?:r|s)k_(?:live|test)_[0-9A-Za-z]{24,}\b'

message: "Stripe API key detected in content. Remove hardcoded Stripe keys and use environment variables or a secrets manager instead."
