id: twilio-secret
info:
  name: Twilio API Key/Token
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.15
    - NIST CSF PR.AC-1
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - twilio

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bAC[0-9a-fA-F]{32}\b'
    - '(?i)\b(?:twilio_)?auth_?token[''"]?\s*[:=]\s*[''"]?([0-9a-f]{32})[''"]?'

message: "Twilio credentials detected. Exposed Twilio keys can lead to significant API usage costs."
