id: telegram-bot-token
info:
  name: Telegram Bot Token
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.15
    - NIST CSF PR.AC-3
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - telegram

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b\d{8,10}:[0-9A-Za-z_-]{35}\b'

message: "Telegram bot token detected. Bot tokens grant full control over the bot's identity and messages."
