id: github-token
info:
  name: GitHub Token
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - PCI DSS Req 8.6
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - github
    - vcs
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36}\b'
    - '\bgithub_pat_[A-Za-z0-9_]{20,255}\b'

message: "GitHub token detected in content. Remove hardcoded GitHub tokens and use environment variables or a secrets manager instead."
