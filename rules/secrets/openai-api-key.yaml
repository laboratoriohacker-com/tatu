id: openai-api-key
info:
  name: OpenAI API Key
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - openai
    - ai

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bsk-[A-Za-z0-9-_]*[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}\b'

message: "OpenAI API key detected. Exposed keys can be used for unauthorized AI model access and costs."
