id: gitlab-token
info:
  name: GitLab Token
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - PCI DSS Req 8.6
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  description: Detects various types of GitLab personal and system tokens.
  tags:
    - gitlab
    - devops

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b(?:glpat|gldt|glft|glsoat|glrt)-[A-Za-z0-9_\-]{20,50}(?!\w)\b'
    - '\bGR1348941[A-Za-z0-9_\-]{20,50}(?!\w)\b'
    - '\bglcbt-(?:[0-9a-fA-F]{2}_)?[A-Za-z0-9_\-]{20,50}(?!\w)\b'

message: "GitLab token detected. Exposed tokens can lead to unauthorized repository access."
