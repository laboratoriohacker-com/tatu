id: private-key
info:
  name: Private Key Material
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - ISO 27001 A.10.1
    - PCI DSS Req 3.5
    - NIST CSF PR.DS-1
    - FedRAMP SC-28
    - DORA Art. 9
  tags:
    - cryptography
    - private-key
    - pem

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '-----BEGIN (?:RSA |EC |DSA |ENCRYPTED )?PRIVATE KEY-----'
    - '-----BEGIN OPENSSH PRIVATE KEY-----'
    - '-----BEGIN PGP PRIVATE KEY BLOCK-----'

message: "Private key material detected in content. Never commit private keys to source control. Store keys in a secure secrets manager."
