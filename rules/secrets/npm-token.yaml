id: npm-token
info:
  name: NPM Registry Token
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - npm
    - nodejs

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bnpm_[A-Za-z0-9]{30,}\b'
    - '\/\/[^\n]+\/:_authToken=\s*((npm_.+)|([A-Fa-f0-9-]{36}))'

message: "NPM token detected. Ensure tokens are not committed to source control or .npmrc files."
