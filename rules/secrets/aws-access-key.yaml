id: aws-access-key
info:
  name: AWS Access Key
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.15
    - ISO 27001 A.8.24
    - PCI DSS Req 2.2
    - NIST CSF PR.AC-1
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - aws
    - cloud
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b(?:A3T[A-Z0-9]|ABIA|ACCA|AKIA|ASIA)[A-Z0-9]{16}\b'
    - '(?i)aws_secret_access_key\s*[:=]\s*[''"]?[A-Za-z0-9/+=]{40}'

message: "AWS credential detected in content. Remove hardcoded AWS keys and use environment variables or IAM roles instead."
