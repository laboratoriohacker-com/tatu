id: jwt-token
info:
  name: JSON Web Token (JWT)
  author: tatu-core
  severity: warning
  category: secrets
  description: Detects JWT tokens in code or configuration.
  tags:
    - jwt
    - auth

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\beyJ[A-Za-z0-9\-_=]+\.[A-Za-z0-9\-_=]+\.?[A-Za-z0-9\-_.+/=]*?\b'

message: "JWT detected. Hardcoded tokens are insecure and should be rotated frequently."
