id: azure-storage-secret
info:
  name: Azure Storage Account Key/SAS
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - PCI DSS Req 8.6
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - azure
    - cloud

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - 'AccountKey=[A-Za-z0-9+/=]{88}'
    - '[\?&]sv=\d{4}-\d{2}-\d{2}[^ \n]*?&sig=[A-Za-z0-9%+/=]{16,}'

message: "Azure Storage secret detected. Use Azure Key Vault for managing cloud credentials."
