id: slack-token
info:
  name: Slack Token or Webhook
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.5.15
    - NIST CSF PR.AC-3
    - FedRAMP AC-2
    - DORA Art. 9
  tags:
    - slack
    - webhook
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - 'xox(?:a|b|p|o|s|r)-(?:\d+-)+[a-z0-9]+'
    - 'https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'

message: "Slack token or webhook URL detected in content. Remove hardcoded Slack credentials and use environment variables or a secrets manager instead."
