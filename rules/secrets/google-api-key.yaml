id: google-api-key
info:
  name: Google API Key
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - PCI DSS Req 8.6
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - google
    - cloud
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bAIza[0-9A-Za-z\-_]{35}\b'

message: "Google API key detected in content. Remove hardcoded Google API keys and use environment variables or Google Secret Manager instead."
