id: anthropic-key
info:
  name: Anthropic API Key
  author: tatu-core
  severity: critical
  category: secrets
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.8.24
    - NIST CSF PR.AC-1
    - FedRAMP IA-2
    - DORA Art. 9
  tags:
    - anthropic
    - ai
    - credentials

hook:
  events:
    - PreToolUse
    - PostToolUse
  matcher: Write|Edit|Bash|Read
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bsk-ant-api\d+-[A-Za-z0-9_-]{90,}\b'

message: "Anthropic API key detected in content. Remove hardcoded Anthropic API keys and use environment variables or a secrets manager instead."
