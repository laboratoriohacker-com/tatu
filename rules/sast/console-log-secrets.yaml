id: sast-console-log-secrets
info:
  name: Sensitive Data Logging (Frontend)
  author: tatu-blue-team
  severity: warning
  category: sast
  compliance:
    - OWASP A09:2021
  description: Detects console.log statements that might leak sensitive objects like tokens, keys, or user data.
  tags:
    - javascript
    - react
    - privacy

hook:
  event: PreToolUse
  matcher: Write|Edit
  action: warn
  mode: audit

detect:
  type: regex
  patterns:
    - 'console\.(?:log|debug|info|error)\(.*\b(?:token|secret|key|password|auth|credential|user)\b.*\)'
    - 'console\.(?:log|debug|info|error)\(.*\b(?:res\.data|response\.data)\b.*\)'

message: "Sensitive data logging detected. Avoid logging tokens, secrets, or raw API responses to the browser console in production builds."
