id: credit-card-number
info:
  name: Credit Card Number
  author: tatu-core
  severity: critical
  category: pii
  compliance:
    - GDPR Art. 5
    - GDPR Art. 32
    - PCI DSS Req 3.4
    - ISO 27001 A.8.24
    - NIST CSF PR.DS-1
    - FedRAMP SC-28
    - DORA Art. 9
  description: Detects sequences of 13 to 16 digits that likely represent credit card numbers.
  tags:
    - pii
    - gdpr
    - credit-card
    - pci-dss

hook:
  event: PreToolUse
  matcher: Write|Edit
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\b(?:\d[ -]*?){13,16}\b'

message: "Potential Credit Card Number detected. Hardcoding real payment card data violates GDPR and PCI-DSS requirements. Use anonymized data for development."
