id: destructive-sql-drop
info:
  name: Destructive SQL Statement
  author: tatu-core
  severity: critical
  category: destructive
  compliance:
    - SOC2 CC6.1
    - ISO 27001 A.12.4
  tags:
    - destructive
    - sql
    - database

hook:
  event: PreToolUse
  matcher: Bash
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '(?i)\bDROP\s+(?:TABLE|DATABASE|SCHEMA)\b'
    - '(?i)\bTRUNCATE\s+TABLE\b'

message: "Destructive SQL statement detected. DROP TABLE/DATABASE and TRUNCATE TABLE commands can cause irreversible data loss. Verify intent before proceeding."
