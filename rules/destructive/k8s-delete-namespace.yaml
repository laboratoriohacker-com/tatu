id: k8s-delete-namespace
info:
  name: Kubernetes Namespace Deletion
  author: tatu-core
  severity: critical
  category: destructive
  compliance:
    - ISO 27001 A.12.1
  description: Detects deletion of Kubernetes namespaces.
  tags:
    - k8s
    - cloud

hook:
  event: PreToolUse
  matcher: Bash
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '\bkubectl\s+delete\s+namespace\s+\w+'
    - '\bkubectl\s+delete\s+ns\s+\w+'

message: "Kubernetes namespace deletion detected. This will destroy all resources within that namespace."
