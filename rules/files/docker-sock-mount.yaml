id: docker-sock-mount
info:
  name: Docker Socket Mount (Privilege Escalation)
  author: tatu-blue-team
  severity: critical
  category: files
  compliance:
    - CIS Docker Benchmark
    - ISO 27001 A.8.12
    - PCI DSS Req 2.2
    - NIST CSF PR.AC-4
    - FedRAMP SC-7
    - DORA Art. 9
  description: Detects mounting of the Docker socket (/var/run/docker.sock), which grants root-level host access to the container.
  tags:
    - docker
    - infrastructure
    - privilege-escalation

hook:
  event: PreToolUse
  matcher: Write|Edit
  action: block
  mode: audit

detect:
  type: regex
  patterns:
    - '/var/run/docker\.sock'
    - '\-v\s+.*docker\.sock'

message: "Docker socket mount detected. Exposing '/var/run/docker.sock' gives the container full root access to the host. Use a secure alternative or Docker-in-Docker (dind)."
